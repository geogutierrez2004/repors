<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; frame-src 'self' https: http:;" />
  <title>St. Clare College Filing System</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Design tokens: light mode (default) ── */
    :root {
      --bg-base:        #f0f2f5;
      --bg-surface:     #ffffff;
      --bg-sidebar:     #1e293b;
      --bg-hover:       #f1f5f9;
      --bg-active:      #e0e7ff;
      --border:         #e2e8f0;
      --text-primary:   #1e293b;
      --text-secondary: #64748b;
      --text-sidebar:   #cbd5e1;
      --text-sidebar-active: #ffffff;
      --accent:         #4f46e5;
      --accent-hover:   #4338ca;
      --danger:         #dc2626;
      --warning:        #d97706;
      --success:        #16a34a;
      --info:           #0284c7;
      --shadow-sm:      0 1px 3px rgba(0,0,0,.08);
      --shadow-md:      0 4px 12px rgba(0,0,0,.10);
      --radius-sm:      4px;
      --radius-md:      8px;
      --radius-lg:      12px;
      --transition:     150ms ease;
    }

    /* ── Dark mode overrides ── */
    [data-theme="dark"] {
      --bg-base:        #0f172a;
      --bg-surface:     #1e293b;
      --bg-sidebar:     #020617;
      --bg-hover:       #1e293b;
      --bg-active:      #312e81;
      --border:         #334155;
      --text-primary:   #f1f5f9;
      --text-secondary: #94a3b8;
      --text-sidebar:   #94a3b8;
      --text-sidebar-active: #ffffff;
      --shadow-sm:      0 1px 3px rgba(0,0,0,.3);
      --shadow-md:      0 4px 12px rgba(0,0,0,.4);
    }

    /* ── Base ── */
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      transition: background var(--transition), color var(--transition);
    }
    #root { height: 100%; }

    /* ── Scrollbar (dark-mode aware) ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Print styles ── */
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { background: white; color: black; font-size: 12px; }
      .printable { display: block; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ccc; padding: 4px 8px; }
      th { background: #f0f0f0; }
      a { color: black; text-decoration: none; }
      @page { margin: 1.5cm; }
    }
    .print-only { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.js"></script>
</body>
</html>
