<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>St. Clare College Filing System</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #0f172a;
      --muted: #475569;
      --accent: #1d4ed8;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --surface: rgba(255, 255, 255, 0.94);
      --surface-border: rgba(148, 163, 184, 0.18);
      --shadow: 0 30px 80px rgba(15, 23, 42, 0.18);
      --bg-1: #0f172a;
      --bg-2: #111827;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { min-height: 100%; }
    body {
      font-family: 'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.20), transparent 28%),
        linear-gradient(135deg, #020617 0%, var(--bg-1) 45%, var(--bg-2) 100%);
      color: #e2e8f0;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.92), rgba(0,0,0,0.35));
    }

    button, input { font: inherit; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
      gap: 28px;
      padding: 32px;
      align-items: center;
    }

    .hero-panel {
      position: relative;
      min-height: calc(100vh - 64px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 40px;
      background: linear-gradient(160deg, rgba(15, 23, 42, 0.88), rgba(2, 6, 23, 0.68));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-panel::after {
      content: '';
      position: absolute;
      inset: auto -10% -26% auto;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.25), transparent 68%);
    }

    .brand-mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #fff;
      background: linear-gradient(135deg, #60a5fa, #2563eb 55%, #1e3a8a);
      box-shadow: 0 16px 32px rgba(37, 99, 235, 0.35);
    }

    .hero-copy {
      margin-top: 88px;
      max-width: 620px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      color: #bfdbfe;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero-title {
      margin-top: 22px;
      font-size: clamp(2.5rem, 4vw, 4.6rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      color: #f8fafc;
    }

    .hero-lead {
      margin-top: 18px;
      max-width: 42rem;
      color: rgba(226, 232, 240, 0.84);
      line-height: 1.7;
      font-size: 1.02rem;
    }

    .feature-grid {
      margin-top: 32px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .feature-card {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    .feature-card strong {
      display: block;
      margin-bottom: 8px;
      color: #f8fafc;
      font-size: 1rem;
    }

    .feature-card span {
      color: rgba(226, 232, 240, 0.72);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .login-panel {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @media (max-width: 960px) {
      body { overflow: auto; }
      .app-shell { grid-template-columns: 1fr; padding: 20px; }
      .hero-panel { min-height: auto; }
      .hero-copy { margin-top: 58px; }
    }

    @media (max-width: 640px) {
      .app-shell { padding: 14px; gap: 16px; }
      .hero-panel { padding: 24px; border-radius: 24px; }
      .feature-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.js"></script>
</body>
</html>
